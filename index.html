<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Pecera - Iluminación Phong</title>
  <style>
      html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
      canvas { width: 100%; height: 100%; touch-action: none; display: block; }

      /* Panel UI */
      #uiPanel {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 10;
        background: rgba(0,0,0,0.55);
        color: white;
        padding: 12px 14px;
        border-radius: 10px;
        font-family: Arial, sans-serif;
        font-size: 13px;
        width: 260px;
        user-select: none;
      }
      #uiPanel h3 {
        margin: 0 0 8px 0;
        font-size: 14px;
      }
      #uiPanel .row { margin: 8px 0; }
      #uiPanel label { display: block; margin-bottom: 4px; opacity: 0.9; }
      #uiPanel input[type="range"] { width: 100%; }
      #uiPanel .hint {
        margin-top: 10px;
        font-size: 12px;
        opacity: 0.85;
        line-height: 1.25;
      }
      #uiPanel .val { float: right; opacity: 0.9; }

      /* Teclas tipo "keycap" */
    .keysHelp {
      margin-top: 10px;
      font-size: 12px;
      opacity: 0.95;
      line-height: 1.35;
    }
    
    .keysGrid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
      margin-top: 6px;
    }
    
    .krow {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .keycap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      height: 24px;
      padding: 0 8px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.10);
      box-shadow: 0 2px 0 rgba(0,0,0,0.25);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-weight: 700;
      letter-spacing: 0.3px;
    }
    
    .keycap.small { min-width: 24px; padding: 0 6px; }
    .keycap.wide  { min-width: 52px; }
    
    .action {
      color: rgba(255,255,255,0.92);
    }
    
    .noteTiny {
      margin-top: 6px;
      opacity: 0.8;
      font-size: 11px;
    }

    /* Upgrade: layout tipo videojuego */
    .keysGrid2 {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 10px;
      margin-top: 8px;
      align-items: center;
    }

    .keyPad {
      display: grid;
      grid-template-columns: repeat(3, 28px);
      grid-template-rows: repeat(2, 28px);
      gap: 6px;
      justify-content: start;
    }

    .keyPad .empty {
      width: 28px;
      height: 28px;
      opacity: 0;
    }

    .keycap.big {
      width: 28px;
      height: 28px;
      padding: 0;
      border-radius: 7px;
    }

    .keyArrows {
      display: grid;
      grid-template-columns: 52px;
      grid-template-rows: 28px 28px;
      gap: 6px;
    }

    .keycap.arrow {
      width: 52px;
      height: 28px;
      padding: 0;
      border-radius: 7px;
    }

    /* Etiquetas con icono */
    .actionLine {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 4px 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.18);
      font-size: 11px;
      white-space: nowrap;
    }

    .badge .ico {
      font-size: 13px;
    }

    /* Botón toggle UI */
    #toggleUI {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 11;
      background: rgba(0,0,0,0.55);
      color: white;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #toggleUI:hover {
      background: rgba(0,0,0,0.7);
    }

    #toggleUI .ico {
      font-size: 14px;
    }
    </style>

</head>
<body>

    <div id="uiPanel">
      <h3>Controles de luz (Sol)</h3>

      <div class="row">
        <label>Intensidad <span class="val" id="valIntensity">1.2</span></label>
        <input id="intensity" type="range" min="0" max="3" step="0.05" value="1.2">
      </div>

      <div class="row">
        <label>Ángulo <span class="val" id="valAngle">0.00</span></label>
        <input id="angle" type="range" min="-3.14" max="3.14" step="0.01" value="0">
      </div>

      <div class="row">
        <label>Inclinación (radius) <span class="val" id="valRadius">2.50</span></label>
        <input id="radius" type="range" min="0.5" max="6" step="0.05" value="2.5">
      </div>

      <div class="row">
        <label>Distancia del marcador <span class="val" id="valMarker">1.20</span></label>
        <input id="markerDist" type="range" min="0.5" max="3" step="0.05" value="1.2">
      </div>


      <hr style="border:0;border-top:1px solid rgba(255,255,255,0.15); margin:10px 0;">
        
      <h3 style="margin:0 0 6px 0;">Lámpara de la pecera</h3>
        
      <div class="row">
        <label>
          <input type="checkbox" id="lampOn" checked>
          Encender lámpara
        </label>
      </div>
      
      <div class="row">
        <label>Color <span class="val" id="valLampColor">#ffffff</span></label>
        <input id="lampColor" type="color" value="#ffffff" style="width:100%; height:34px; border:none; background:transparent;">
      </div>
      
      <div class="row">
        <label>Intensidad <span class="val" id="valLampIntensity">1.50</span></label>
        <input id="lampIntensity" type="range" min="0" max="20" step="0.1" value="6">
      </div>




      <div class="keysHelp">
        <b>Controles rápidos</b>
      
        <div class="keysGrid2">
          <!-- WASD (cruz) -->
          <div class="keyPad">
            <span class="empty"></span>
            <span class="keycap big">W</span>
            <span class="empty"></span>
          
            <span class="keycap big">A</span>
            <span class="keycap big">S</span>
            <span class="keycap big">D</span>
          </div>
      
          <div>
            <div class="actionLine">
              <span class="badge"><span class="ico">☀️</span> Dirección</span>
              <span class="action"><b>A/D</b> rotan el sol · <b>W/S</b> cambia inclinación</span>
            </div>
            <div class="noteTiny">W = más arriba (menos inclinación) · S = más abajo</div>
          </div>
      
          <!-- Flechas -->
          <div class="keyArrows">
            <span class="keycap arrow">↑</span>
            <span class="keycap arrow">↓</span>
          </div>
      
          <div>
            <div class="actionLine">
              <span class="badge"><span class="ico">🔆</span> Intensidad</span>
              <span class="action"><b>↑</b> aumenta · <b>↓</b> reduce</span>
            </div>
            <div class="noteTiny">También puedes usar los sliders para ajuste fino.</div>
          </div>
        </div>
      </div>


    </div>
    <div id="toggleUI">
      <span class="ico">📌</span>
      <span id="toggleText">Ocultar controles</span>
    </div>


<canvas id="renderCanvas"></canvas>
<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
<script src="https://cdn.babylonjs.com/materialsLibrary/babylon.waterMaterial.min.js"></script>
<script src="https://cdn.babylonjs.com/lights/babylon.rectAreaLight.min.js"></script>



<script>
  const canvas = document.getElementById("renderCanvas");
  const engine = new BABYLON.Engine(canvas, true);

    const createScene = function () {
      const scene = new BABYLON.Scene(engine);
    
      // ===== Cámara (sin duplicados) =====
      const camera = new BABYLON.ArcRotateCamera(
        "camera",
        Math.PI / 2,
        Math.PI / 3,
        4, // cerca al iniciar
        BABYLON.Vector3.Zero(),
        scene
      );
      camera.attachControl(canvas, true);
      // Evita que la cámara use teclado (flechas) y te robe los controles
      if (camera.inputs && camera.inputs.attached && camera.inputs.attached.keyboard) {
        camera.inputs.attached.keyboard.detachControl();
      }

    
      camera.lowerRadiusLimit = 1.35;          // más cerca
      camera.upperRadiusLimit = 30;
      camera.wheelDeltaPercentage = 0.005;    // zoom MUY suave (rueda)
      camera.pinchDeltaPercentage = 0.005;    // touchpad
    
      // ===== Luces =====
      const hemi = new BABYLON.HemisphericLight("hemi", new BABYLON.Vector3(0, 1, 0), scene);
      hemi.intensity = 0.7;
    
      const light = new BABYLON.DirectionalLight("sun", new BABYLON.Vector3(-1, -2, -1), scene);
      light.intensity = 1.2;

      //let lampLight = null;
    
      // ===== Environment (reflejos) =====
      scene.environmentTexture = BABYLON.CubeTexture.CreateFromPrefilteredData(
        "https://playground.babylonjs.com/textures/environment.env",
        scene
      );
      scene.environmentIntensity = 0.7;

      // ===== Imagen =====
      scene.imageProcessingConfiguration.exposure = 1.05; // antes 1.35
      scene.imageProcessingConfiguration.contrast = 1.08;

    
      // ===== Cargar PECERA (SOLO UNA VEZ) =====

      //let lampLight = null;
      let lampLights = []; 
      let lampEmissiveMat = null;

      BABYLON.SceneLoader.Append("./", "pecera1.glb", scene, () => {

          // --- Vidrio ---
          const glass = scene.getMeshByName("Aqua glass.002");
          if (glass) {
            const glassMat = new BABYLON.StandardMaterial("glassMat", scene);
            glassMat.diffuseColor = new BABYLON.Color3(0.85, 0.90, 1.0);
            glassMat.alpha = 0.18;
            glassMat.specularColor = new BABYLON.Color3(1, 1, 1);
            glassMat.specularPower = 256;
            glassMat.needDepthPrePass = true;
            glass.material = glassMat;
          }      

      

          // --- Agua (PRO: PBR + Refraction + Normal animada) ---
          // === AGUA: agarrar mesh una sola vez ===
          const waterMesh = scene.getMeshByName("water");

          if (waterMesh) {
          
            // ===== BURBUJAS (ParticleSystem) - CONTENIDAS EN EL AGUA =====
            const bbox = waterMesh.getBoundingInfo().boundingBox;
            const min = bbox.minimumWorld.clone();
            const max = bbox.maximumWorld.clone();

            // margen hacia adentro para que no nazcan pegadas al vidrio
            const marginX = (max.x - min.x) * 0.10;
            const marginZ = (max.z - min.z) * 0.10;
            const marginTop = (max.y - min.y) * 0.06;

            // límites interiores “seguros”
            const safeMin = new BABYLON.Vector3(min.x + marginX, min.y,             min.z + marginZ);
            const safeMax = new BABYLON.Vector3(max.x - marginX, max.y - marginTop, max.z - marginZ);

            // 1) CREAR bubbles ANTES de usarlo
            const bubbles = new BABYLON.ParticleSystem("bubbles", 900, scene);
            bubbles.particleTexture = new BABYLON.Texture(
              "https://playground.babylonjs.com/textures/flare.png",
              scene
            );

            // Emisor pegado al lateral de la lámpara
            const lampSideMesh = scene.getMeshByName("Aqua light.002") || scene.getMeshByName("Aqua light.003");
            const emitter = new BABYLON.TransformNode("bubblesEmitter", scene);

            // fallback: lateral derecho
            emitter.position = new BABYLON.Vector3(
              safeMax.x - 0.06,
              safeMin.y + (safeMax.y - safeMin.y) * 0.08,
              (safeMin.z + safeMax.z) * 0.5
            );

            // si existe lámpara, elige automáticamente el lado
            if (lampSideMesh) {
              const lp = lampSideMesh.getAbsolutePosition();
              const distToMin = Math.abs(lp.x - safeMin.x);
              const distToMax = Math.abs(lp.x - safeMax.x);
              emitter.position.x = (distToMin < distToMax ? safeMin.x + 0.03 : safeMax.x - 0.03);
              emitter.position.z = BABYLON.Scalar.Clamp(lp.z, safeMin.z + 0.06, safeMax.z - 0.06);
              emitter.position.y = safeMin.y + (safeMax.y - safeMin.y) * 0.08;
            }

            bubbles.emitter = emitter;

            // Caja angosta = “chorrito” lateral
            const spanZ = (safeMax.z - safeMin.z) * 0.12;
            const spanX = (safeMax.x - safeMin.x) * 0.03;
            bubbles.minEmitBox = new BABYLON.Vector3(-spanX, 0, -spanZ);
            bubbles.maxEmitBox = new BABYLON.Vector3( spanX, 0,  spanZ);

            // Apariencia
            bubbles.color1 = new BABYLON.Color4(1, 1, 1, 0.14);
            bubbles.color2 = new BABYLON.Color4(0.9, 0.95, 1, 0.06);
            bubbles.colorDead = new BABYLON.Color4(1, 1, 1, 0.0);

            bubbles.minSize = 0.006;
            bubbles.maxSize = 0.028;

            bubbles.minLifeTime = 1.0;
            bubbles.maxLifeTime = 2.4;

            bubbles.direction1 = new BABYLON.Vector3(-0.01, 0.25, -0.01);
            bubbles.direction2 = new BABYLON.Vector3( 0.01, 0.45,  0.01);

            // gravedad hacia abajo (OK)
            bubbles.gravity = new BABYLON.Vector3(0, -0.08, 0);

            bubbles.emitRate = 120;
            bubbles.updateSpeed = 0.02;
            bubbles.blendMode = BABYLON.ParticleSystem.BLENDMODE_STANDARD;

            bubbles.start();
            window.bubblesSystem = bubbles;

            // si se salen, mueren
            scene.onBeforeRenderObservable.add(() => {
              const arr = bubbles.particles;
              if (!arr || arr.length === 0) return;
            
              for (let i = 0; i < arr.length; i++) {
                const p = arr[i];
                if (!p) continue;
              
                if (
                  p.position.x < safeMin.x || p.position.x > safeMax.x ||
                  p.position.y < safeMin.y || p.position.y > safeMax.y ||
                  p.position.z < safeMin.z || p.position.z > safeMax.z
                ) {
                  p.lifeTime = 0.0;
                }
              }
            });


          
            // ===== AGUA “PRO”: PBR + normal animada =====
            const w = new BABYLON.PBRMaterial("waterPBR", scene);
            w.metallic = 0.0;
            w.roughness = 0.06;
            w.alpha = 0.45;
            w.albedoColor = new BABYLON.Color3(0.03, 0.18, 0.22);
          
            // ✅ Normal map que SÍ existe (usa playground texture)
            w.bumpTexture = new BABYLON.Texture(
              "https://playground.babylonjs.com/textures/waterbump.png",
              scene
            );
            w.bumpTexture.level = 0.9;
            w.bumpTexture.uScale = 3.0;
            w.bumpTexture.vScale = 3.0;
          
            w.environmentIntensity = 1.0;
            w.microSurface = 0.95;
          
            w.subSurface.isRefractionEnabled = true;
            w.subSurface.indexOfRefraction = 1.333;
            w.subSurface.refractionIntensity = 0.65;
            w.subSurface.tintColor = new BABYLON.Color3(0.04, 0.22, 0.26);
            w.subSurface.tintColorAtDistance = 1.2;
          
            w.transparencyMode = BABYLON.PBRMaterial.PBRMATERIAL_ALPHABLEND;
            w.needDepthPrePass = true;
            w.separateCullingPass = true;
            w.backFaceCulling = false;
          
            waterMesh.material = w;
          
            // Animación de ondas
            scene.onBeforeRenderObservable.add(() => {
              if (!w.bumpTexture) return;
              w.bumpTexture.uOffset += 0.00045;
              w.bumpTexture.vOffset += 0.00030;
            });
          
          } else {
            console.warn("No encontré el mesh 'water' dentro del .glb");
          }



          // ===== LÁMPARA de la pecera (SpotLights tipo panel + UI) =====
          const lampMesh1 = scene.getMeshByName("Aqua light.002");
          const lampMesh2 = scene.getMeshByName("Aqua light.003");
          const lampMesh = lampMesh1 || lampMesh2;

          if (lampMesh) {
            // Usamos el bbox del mesh para saber “el ancho” de la lámpara y distribuir luces
            const bb = lampMesh.getBoundingInfo().boundingBox;
            const minW = bb.minimumWorld.clone();
            const maxW = bb.maximumWorld.clone();
            const center = bb.centerWorld.clone();
          
            // “largo” principal en X (si tu lámpara es larga hacia otro eje, lo ajustamos)
            const spanX = (maxW.x - minW.x);
            const spanZ = (maxW.z - minW.z);
          
            // Elegimos el eje más largo para repartir luces
            const alongX = spanX >= spanZ;
          
            // Cantidad de focos: 3 suele bastar para “cubrir” todo
            const count = 3;
          
            // Crea N spotlights alineados en la lámpara
            for (let i = 0; i < count; i++) {
              const t = count === 1 ? 0.5 : i / (count - 1); // 0..1
              const pos = center.clone();
            
              if (alongX) {
                pos.x = minW.x + spanX * t;
              } else {
                pos.z = minW.z + spanZ * t;
              }
            
              // un poquito debajo del cuerpo de la lámpara
              pos.y = center.y - 0.03;
            
              const spot = new BABYLON.SpotLight(
                `lampSpot_${i}`,
                pos,
                BABYLON.Vector3.Down(), // se corrige cada frame
                1.25,   // ángulo más abierto para cubrir superficie (antes estaba muy cerrado)
                8,      // exponent bajo = bordes suaves (antes 30 = “bloquecito”)
                scene
              );
            
              spot.diffuse  = new BABYLON.Color3(1, 1, 1);
              spot.specular = new BABYLON.Color3(1, 1, 1);
              spot.intensity = 2.2;  // base; luego lo controla el slider
              spot.range = 30;
            
              lampLights.push(spot);
            }
          
            // Emisión visual de la lámpara (solo “se ve encendida”)
            lampEmissiveMat = new BABYLON.StandardMaterial("lampEmissiveMat", scene);
            lampEmissiveMat.emissiveColor = new BABYLON.Color3(1, 1, 1);
            lampEmissiveMat.disableLighting = true;
          
            // Si el mesh tiene material, le ponemos emissive sin romperlo demasiado
            const lmMat = lampMesh.material;
            if (lmMat && lmMat.emissiveColor) {
              lmMat.emissiveColor = new BABYLON.Color3(1, 1, 1);
            }
          
            // UI
            const lampOn = document.getElementById("lampOn");
            const lampColor = document.getElementById("lampColor");
            const lampIntensity = document.getElementById("lampIntensity");
            const valLampColor = document.getElementById("valLampColor");
            const valLampIntensity = document.getElementById("valLampIntensity");
          
            function applyLampUI() {
              const isOn = lampOn.checked;
              const col = BABYLON.Color3.FromHexString(lampColor.value);
              const inten = parseFloat(lampIntensity.value);
            
              // Repartimos intensidad entre los focos para que no queme
              const perLight = inten / Math.max(1, lampLights.length);
            
              lampLights.forEach(L => {
                L.setEnabled(isOn);
                L.diffuse = col;
                L.specular = col;
                L.intensity = perLight;
              });
            
              if (lampEmissiveMat) {
                lampEmissiveMat.emissiveColor = isOn ? col : BABYLON.Color3.Black();
              }
            
              valLampColor.textContent = lampColor.value;
              valLampIntensity.textContent = inten.toFixed(2);
            }
          
            lampOn.addEventListener("change", applyLampUI);
            lampColor.addEventListener("input", applyLampUI);
            lampIntensity.addEventListener("input", applyLampUI);
            applyLampUI();
          
          } else {
            console.warn("No encontré 'Aqua light.002' ni 'Aqua light.003' para la lámpara.");
          }



          // AHORA sí: cargar el pez (ya existe water)
          // ===== Cargar PEZ =====
          BABYLON.SceneLoader.ImportMesh("", "./", "fish.glb", scene,
            function (meshes, ps, sk, animationGroups) {
              const pez = meshes[0];
            
              // parar animación
              if (animationGroups && animationGroups.length > 0) {
                animationGroups.forEach(ag => { ag.stop(); ag.reset(); });
              }
          
              // material Phong del pez
              const pezMat = new BABYLON.StandardMaterial("pezMat", scene);
              pezMat.diffuseColor = new BABYLON.Color3(1.0, 0.5, 0.2);
              pezMat.specularColor = new BABYLON.Color3(1, 1, 1);
              pezMat.specularPower = 128;
              pez.material = pezMat;
          
              pez.scaling = new BABYLON.Vector3(0.2, 0.2, 0.2);
              pez.rotation.y = Math.PI / 2;
          
              const water = scene.getMeshByName("water");
              if (water) {
                const bbox = water.getBoundingInfo().boundingBox;
                const center = bbox.centerWorld;
                const yMin = bbox.minimumWorld.y;
                const yMax = bbox.maximumWorld.y;
            
                // Colócalo dentro del agua
                pez.position = new BABYLON.Vector3(center.x, yMin + (yMax - yMin) * 0.45, center.z);
                pez.position.z += 0.05;
              } else {
                pez.position = new BABYLON.Vector3(0, 0.5, 0);
              }
          
              window.pezRef = pez;

              const waterMesh2 = scene.getMeshByName("water");
              const wm = waterMesh2?.material;
              if (wm && wm instanceof BABYLON.WaterMaterial) {
                wm.addToRenderList(pez);
              }

            }

            

        );
      }
      
    
    ); 
  
        // Mantener la lámpara pegada al mesh + apuntar al centro del agua
        scene.onBeforeRenderObservable.add(() => {
          if (!lampLights || lampLights.length === 0) return;
        
          const lm = scene.getMeshByName("Aqua light.002") || scene.getMeshByName("Aqua light.003");
          if (!lm) return;
        
          // Recalcula bbox “actual” por si el mesh se mueve
          const bb = lm.getBoundingInfo().boundingBox;
          const minW = bb.minimumWorld.clone();
          const maxW = bb.maximumWorld.clone();
          const center = bb.centerWorld.clone();
          const spanX = (maxW.x - minW.x);
          const spanZ = (maxW.z - minW.z);
          const alongX = spanX >= spanZ;
        
          // Dirección hacia el centro del agua (mejor que “Down” fijo)
          const water = scene.getMeshByName("water");
          const target = water ? water.getBoundingInfo().boundingBox.centerWorld : BABYLON.Vector3.Zero();
        
          const count = lampLights.length;
        
          for (let i = 0; i < count; i++) {
            const t = count === 1 ? 0.5 : i / (count - 1);
            const pos = center.clone();
          
            if (alongX) pos.x = minW.x + spanX * t;
            else        pos.z = minW.z + spanZ * t;
          
            pos.y = center.y - 0.03;
          
            lampLights[i].position.copyFrom(pos);
            lampLights[i].direction = target.subtract(pos).normalize();
          }
        });


    
        // ===== Sol controlable (se nota) =====
        let sunAngle = 0;
        let sunRadius = 2.5;
        let markerDistance = 1.2;

        // Marcador del sol (para corroborar iluminación)
        const sunMarker = BABYLON.MeshBuilder.CreateSphere("sunMarker", { diameter: 0.12 }, scene);
        const sunMat = new BABYLON.StandardMaterial("sunMat", scene);
        sunMat.emissiveColor = new BABYLON.Color3(1, 1, 0);
        sunMarker.material = sunMat;

        // UI elementos
        const uiIntensity = document.getElementById("intensity");
        const uiAngle = document.getElementById("angle");
        const uiRadius = document.getElementById("radius");
        const uiMarkerDist = document.getElementById("markerDist");

        const valIntensity = document.getElementById("valIntensity");
        const valAngle = document.getElementById("valAngle");
        const valRadius = document.getElementById("valRadius");
        const valMarker = document.getElementById("valMarker");

        function updateSunDirection() {
          light.direction = new BABYLON.Vector3(
            Math.cos(sunAngle),
            -sunRadius,
            Math.sin(sunAngle)
          ).normalize();
        
          // Centro = agua si existe, si no origen
          const water = scene.getMeshByName("water");
          const center = water ? water.getBoundingInfo().boundingBox.centerWorld : BABYLON.Vector3.Zero();
        
          // marcador más cerca
          sunMarker.position = center.subtract(light.direction.scale(markerDistance));
        
          // Actualizar UI texto
          valIntensity.textContent = light.intensity.toFixed(2);
          valAngle.textContent = sunAngle.toFixed(2);
          valRadius.textContent = sunRadius.toFixed(2);
          valMarker.textContent = markerDistance.toFixed(2);
        }

        // Inicializar valores UI
        uiIntensity.value = light.intensity;
        uiAngle.value = sunAngle;
        uiRadius.value = sunRadius;
        uiMarkerDist.value = markerDistance;

        // Eventos UI (sliders)
        uiIntensity.addEventListener("input", () => {
          light.intensity = parseFloat(uiIntensity.value);
          updateSunDirection();
        });
        uiAngle.addEventListener("input", () => {
          sunAngle = parseFloat(uiAngle.value);
          updateSunDirection();
        });
        uiRadius.addEventListener("input", () => {
          sunRadius = parseFloat(uiRadius.value);
          updateSunDirection();
        });
        uiMarkerDist.addEventListener("input", () => {
          markerDistance = parseFloat(uiMarkerDist.value);
          updateSunDirection();
        });

        updateSunDirection();

        // Teclado (sigue funcionando aunque muevas la cámara)
        window.addEventListener("keydown", (e) => {
          if (["ArrowLeft","ArrowRight","ArrowUp","ArrowDown"," "].includes(e.key)) e.preventDefault();
        
          const stepAngle = 0.12;
          const stepRadius = 0.15;
        
          if (e.key === "a" || e.key === "A") sunAngle -= stepAngle;
          if (e.key === "d" || e.key === "D") sunAngle += stepAngle;
        
          if (e.key === "w" || e.key === "W") sunRadius = Math.max(0.5, sunRadius - stepRadius);
          if (e.key === "s" || e.key === "S") sunRadius = Math.min(6.0, sunRadius + stepRadius);
        
          if (e.key === "ArrowUp")   light.intensity = Math.min(3, light.intensity + 0.1);
          if (e.key === "ArrowDown") light.intensity = Math.max(0, light.intensity - 0.1);
        
          // Sincronizar sliders con teclado
          uiIntensity.value = light.intensity;
          uiAngle.value = sunAngle;
          uiRadius.value = sunRadius;
        
          updateSunDirection();
        });

    
    // ===== Toggle panel de controles =====
    const uiPanel = document.getElementById("uiPanel");
    const toggleBtn = document.getElementById("toggleUI");
    const toggleText = document.getElementById("toggleText");

    let uiVisible = true;

    toggleBtn.addEventListener("click", () => {
      uiVisible = !uiVisible;
      uiPanel.style.display = uiVisible ? "block" : "none";
      toggleText.textContent = uiVisible ? "Ocultar controles" : "Mostrar controles";
    });


      return scene;
    };


  const scene = createScene();

  engine.runRenderLoop(() => {
    scene.render();
  });

  window.addEventListener("resize", () => {
    engine.resize();
  });
</script>

</body>
</html>
